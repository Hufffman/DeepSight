apiVersion: v1
kind: Service
metadata:
  name: go-backend
  namespace: deepsight
spec:
  selector:
    app: go-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# SSE anti-buffering middleware — prevents HTTP/2 stream resets from Traefik
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sse-disable-buffering
  namespace: deepsight
spec:
  headers:
    customResponseHeaders:
      X-Accel-Buffering: "no"
      Cache-Control: "no-cache, no-store, must-revalidate"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-backend
  namespace: deepsight
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: deepsight-sse-disable-buffering@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: go-backend
                port:
                  number: 80
