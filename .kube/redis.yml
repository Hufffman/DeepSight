# helm install redis bitnami/redis -n deepsight --create-namespace --set architecture=replication --set auth.enabled=false --set replica.replicaCount=3 --set sentinel.enabled=true
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: deepsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "no"
            - --save
            - ""
            - --protected-mode
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: deepsight
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      nodePort: 30379
