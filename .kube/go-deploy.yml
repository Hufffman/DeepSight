apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-backend
  namespace: deepsight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-backend
  template:
    metadata:
      labels:
        app: go-backend
    spec:
      containers:
        - name: go-backend
          image: 192.168.45.181:5000/deepsight/go-backend:0.1
          imagePullPolicy: Always #IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
