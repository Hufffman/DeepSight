apiVersion: v1
kind: Secret
metadata:
  name: pgvector-secret
  namespace: deepsight
type: Opaque
stringData:
  POSTGRES_USER: root
  POSTGRES_PASSWORD: "123456"
  POSTGRES_DB: postgres

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pgvector-local-hdd
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pgvector-local-pv-worker2
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: pgvector-local-hdd
  local:
    path: /mnt/data/deepsight/pgvector
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker2

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgvector-data
  namespace: deepsight
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: pgvector-local-hdd
  resources:
    requests:
      storage: 100Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: deepsight
spec:
  serviceName: pgvector
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s-worker2
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: pgvector-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgvector-data

---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  namespace: deepsight
spec:
  type: NodePort
  selector:
    app: pgvector
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30432
